name: '🐛 报告 Bug'
description: 提交报告帮助我们改进。
title: '[Bug] '
labels: [ 'type/fix' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间报告问题！请准确解释您的问题。如果可能，请提供一个可复现的片段（这有助于更快地解决问题）。

  - type: textarea
    attributes:
      label: 发生了什么
      description: 描述你遇到的异常。
      placeholder: >
        一个清晰且具体的描述这个异常是什么。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现？
      description: 复现该问题的步骤。
      placeholder: >
        如: 1. 打开 '...'
    validations:
      required: true

  - type: input
    attributes:
      label: 插件版本
      description: 请填写你当前使用的插件版本。
      placeholder: '如: v1.2.0'
    validations:
      required: true

  - type: input
    attributes:
      label: AstrBot 版本
      description: 请填写你当前使用的 AstrBot 版本。
      placeholder: '如: v4.22.1'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 部署方式
      description: 请选择最接近的一项。
      options:
        - 'uv 一键部署'
        - 'Docker / Docker Compose 部署'
        - 'RainYun 一键云部署'
        - 'AstrBot App 桌面应用部署'
        - 'AstrBot Launcher 部署'
        - 'Replit 部署'
        - 'AUR 部署'
        - 'BT-Panel 部署'
        - '1Panel 部署'
        - 'CasaOS 部署'
        - '手动部署（CLI / 源码 / uv）'
        - '其他'
        - '不确定'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 使用的消息平台适配器
      description: 请选择你当前主要复现问题的平台。如涉及多个平台，请先选择最主要的一个，并在下方补充说明。
      options:
        - 'QQ 官方机器人 (Websockets 方式)'
        - 'QQ 官方机器人 (Webhook 方式)'
        - 'OneBot v11 (原 QQ 个人号)'
        - '企微应用'
        - '企微智能机器人'
        - '微信公众号'
        - '个人微信'
        - '飞书'
        - '钉钉'
        - 'Telegram'
        - 'LINE'
        - 'Slack'
        - 'Misskey'
        - 'Discord'
        - 'KOOK'
        - 'Satori (接入 Satori)'
        - 'Satori (使用 server-satori)'
        - 'Matrix (社区提供)'
        - 'VoceChat (社区提供)'
        - '其他平台'
    validations:
      required: true

  - type: input
    attributes:
      label: 其他平台名称（如选择“其他平台”请填写）
      description: 如果你上面选择了“其他平台”，请在这里补充实际平台名称；否则可留空。
      placeholder: '如: 某某社区适配器 / 自定义平台'

  - type: dropdown
    attributes:
      label: 操作系统
      description: 你在哪个操作系统上遇到了这个问题？
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: 如果涉及多个平台、多个 AstrBot 版本或特殊部署环境，请在这里补充。
      placeholder: >
        如: 同样的问题在 Telegram 与 QQ 官机都可复现；使用反向代理；部署在 NAS / 云服务器等。

  - type: textarea
    attributes:
      label: 报错日志
      description: 如报错日志、截图等。请提供完整的 INFO 或 Debug 级别的日志，不要介意它很长！
      placeholder: >
        请提供完整的报错日志或截图。
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗？
      description: 这不是必需的，但我们很乐意在贡献过程中为您提供指导，特别是如果你已经很好地理解了如何实现修复。
      options:
        - label: 是的，我愿意提交 PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'
