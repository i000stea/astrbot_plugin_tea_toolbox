name: '📚 文档改进建议'
description: 提交文档错误、缺失说明或改进建议。
title: '[Docs] '
labels: [ 'type/docs' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间帮助我们改进文档！如果您发现 README、配置说明、接口文档、示例或使用引导存在错误、缺失或难以理解的地方，请通过该模板告诉我们。

  - type: textarea
    attributes:
      label: 文档问题描述
      description: 请简要说明你发现了什么问题。
      placeholder: >
        如: README 中某个配置项说明过于简略，实际使用时不清楚其取值范围和影响。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 涉及的文档位置
      description: 请提供相关文档名称、章节、链接或文件路径。
      placeholder: >
        如: README.md 的“配置说明”章节，或某文档中的某一节。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 你期望如何改进？
      description: 请描述你认为更清晰的写法、应补充的信息，或你希望看到的示例。
      placeholder: >
        如: 希望补充字段含义、默认值、示例配置，以及与不同适配器相关的说明。
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 文档问题类型
      description: 请选择最接近的一项。
      options:
        - '内容错误或过期'
        - '说明缺失或不完整'
        - '示例不足或难以复现'
        - '表述不清晰，容易误解'
        - '排版、格式或链接问题'
        - '其他'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 相关消息平台（可选）
      description: 如果该文档问题与某个平台相关，请选择最接近的一项；如与所有平台通用，可留空或在补充说明中写“全平台”。
      options:
        - 'QQ 官方机器人 (Websockets 方式)'
        - 'QQ 官方机器人 (Webhook 方式)'
        - 'OneBot v11 (原 QQ 个人号)'
        - '企微应用'
        - '企微智能机器人'
        - '微信公众号'
        - '个人微信'
        - '飞书'
        - '钉钉'
        - 'Telegram'
        - 'LINE'
        - 'Slack'
        - 'Misskey'
        - 'Discord'
        - 'KOOK'
        - 'Satori (接入 Satori)'
        - 'Satori (使用 server-satori)'
        - 'Matrix (社区提供)'
        - 'VoceChat (社区提供)'
        - '其他平台'

  - type: input
    attributes:
      label: 其他平台名称（如选择“其他平台”请填写）
      description: 如果你上面选择了“其他平台”，请在这里补充实际平台名称；否则可留空。
      placeholder: '如: 全平台 / 自定义适配器 / 某社区平台'

  - type: dropdown
    attributes:
      label: 相关部署方式（可选）
      description: 如果该文档问题与你的部署环境相关，请选择最接近的一项。
      options:
        - 'uv 一键部署'
        - 'Docker / Docker Compose 部署'
        - 'RainYun 一键云部署'
        - 'AstrBot App 桌面应用部署'
        - 'AstrBot Launcher 部署'
        - 'Replit 部署'
        - 'AUR 部署'
        - 'BT-Panel 部署'
        - '1Panel 部署'
        - 'CasaOS 部署'
        - '手动部署（CLI / 源码 / uv）'
        - '其他'
        - '不确定'

  - type: textarea
    attributes:
      label: 使用背景（可选）
      description: 如果该问题与你的部署方式、适配器、AstrBot 版本或插件版本有关，可以在这里补充。
      placeholder: >
        如: AstrBot Launcher 部署, AstrBot v4.22.1, QQ 官方机器人 (Webhook 方式), 插件 v1.2.0。

  - type: textarea
    attributes:
      label: 可参考的内容（可选）
      description: 如你已经写好了建议文案、示例配置、截图或对照资料，可在这里附上。
      placeholder: >
        可粘贴建议文本、示例配置、截图链接或其他补充材料。

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗？
      description: 这不是必须的，但我们欢迎您直接参与文档改进。
      options:
        - label: 是的，我愿意提交 PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'
